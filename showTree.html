<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive Decision Tree</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link href="css/decisionTree.css" rel="stylesheet" type="text/css" />
<script type="text/javascript" src="js/jquery-3.7.1.min.js"></script>
<script type="text/javascript" src="js/jquery.easing.1.4.1.min.js"></script>
<script type="text/javascript" src="js/jquery.scrollTo-2.1.3.min.js"></script>
<script type="text/javascript" src="js/decisionTree.js"></script>
</head>

<body>
<div id="header">
	<div id="tree-title"></div>
	<div id="breadcrumb"></div>
	<div id="progress"></div>
	<button id="dark-toggle" title="Toggle dark mode">◑</button>
	<button id="start-over" class="hidden">Start over</button>
</div>
<noscript>
<div style="padding:40px;font-family:sans-serif;color:#555;max-width:500px;margin:60px auto;text-align:center">
	<strong>JavaScript is required</strong><br /><br />
	This decision tree viewer needs JavaScript enabled to work.
	Please enable it in your browser settings and reload the page.
</div>
</noscript>
<div id="debug"></div>
<div id="tree-window">
	<div id="loader">
		<div class="spinner"></div>
	</div>
	<div id="tree-slider"></div>
</div>
</body>
</html>
