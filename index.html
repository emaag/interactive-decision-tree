<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Decision Trees</title>
<script type="text/javascript" src="js/jquery-3.7.1.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; }

:root {
	--bg:     #f0f0f0;
	--card:   #ffffff;
	--text:   #111111;
	--muted:  #888888;
	--border: #e0e0e0;
	--shadow: 0 2px 10px rgba(0,0,0,0.07);
}
@media (prefers-color-scheme: dark) {
	:root {
		--bg:     #161616;
		--card:   #232323;
		--text:   #e2e2e2;
		--muted:  #666666;
		--border: #333333;
		--shadow: 0 2px 10px rgba(0,0,0,0.4);
	}
}
body.dark {
	--bg:     #161616;
	--card:   #232323;
	--text:   #e2e2e2;
	--muted:  #666666;
	--border: #333333;
	--shadow: 0 2px 10px rgba(0,0,0,0.4);
}

body {
	margin: 0;
	padding: 0;
	background: var(--bg);
	color: var(--text);
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
	font-size: 16px;
}

header {
	background: #111;
	padding: 16px 24px;
	display: flex;
	align-items: center;
	justify-content: space-between;
}

header h1 {
	margin: 0;
	font-size: 1rem;
	font-weight: 600;
	color: #fff;
}

#dark-toggle {
	background: none;
	border: 1px solid #333;
	color: #aaa;
	width: 30px;
	height: 30px;
	border-radius: 4px;
	font-size: 0.85rem;
	cursor: pointer;
	padding: 0;
	transition: border-color 0.15s, color 0.15s;
}
#dark-toggle:hover { border-color: #aaa; color: #fff; }

main {
	max-width: 680px;
	margin: 48px auto;
	padding: 0 20px;
}

main h2 {
	font-size: 1.6rem;
	font-weight: 700;
	margin: 0 0 6px;
}

main p.subtitle {
	color: var(--muted);
	margin: 0 0 36px;
	font-size: 0.95rem;
}

#tree-list {
	display: flex;
	flex-direction: column;
	gap: 12px;
}

.tree-card {
	background: var(--card);
	border: 1.5px solid var(--border);
	border-radius: 10px;
	padding: 20px 22px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	gap: 16px;
	box-shadow: var(--shadow);
	text-decoration: none;
	color: var(--text);
	transition: border-color 0.15s, transform 0.1s;
}

.tree-card:hover {
	border-color: var(--text);
	text-decoration: none;
	color: var(--text);
	transform: translateY(-1px);
}

.tree-card-body { flex: 1; min-width: 0; }

.tree-card-title {
	font-size: 1.05rem;
	font-weight: 600;
	margin-bottom: 4px;
}

.tree-card-desc {
	font-size: 0.85rem;
	color: var(--muted);
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

.tree-card-arrow {
	font-size: 1.1rem;
	color: var(--muted);
	flex-shrink: 0;
}

#loading { color: var(--muted); font-size: 0.9rem; }
#empty   { color: var(--muted); font-size: 0.9rem; display: none; }

@media (max-width: 480px) {
	main { margin: 28px auto; }
	main h2 { font-size: 1.3rem; }
}
</style>
</head>

<body>
<header>
	<h1>Decision Trees</h1>
	<button id="dark-toggle" title="Toggle dark mode">◑</button>
</header>

<main>
	<h2>What do you need help deciding?</h2>
	<p class="subtitle">Pick a tree and answer a few questions.</p>

	<div id="tree-list">
		<div id="loading">Loading trees…</div>
		<div id="empty">No trees found.</div>
	</div>
</main>

<script>
(function(){
	var saved = localStorage.getItem('dt-theme');
	if( saved === 'dark' ) document.body.classList.add('dark');

	$('#dark-toggle').click( function(){
		if( $('body').hasClass('dark') ){
			$('body').removeClass('dark').addClass('light');
			localStorage.setItem('dt-theme', 'light');
		} else {
			$('body').removeClass('light').addClass('dark');
			localStorage.setItem('dt-theme', 'dark');
		}
	});

	function pad( n ){
		return ('000' + n).slice(-4);
	}

	function addCard( id, title, desc ){
		var $card = $('<a class="tree-card">').attr('href', 'showTree.html?' + id);
		var $body = $('<div class="tree-card-body">');
		$body.append( $('<div class="tree-card-title">').text( title || 'Tree ' + id ) );
		if( desc ){
			$body.append( $('<div class="tree-card-desc">').text( desc ) );
		}
		$card.append( $body );
		$card.append( $('<span class="tree-card-arrow">').html('&rarr;') );
		$('#tree-list').append( $card );
	}

	var found = 0;

	function tryLoad( n ){
		var id = pad(n);
		$.ajax({
			url: 'xml/tree' + id + '.xml',
			type: 'GET',
			dataType: 'xml',
			success: function( xml ){
				$('#loading').hide();
				found++;
				var title = $(xml).find('title').first().text();
				var desc  = $(xml).find('description').first().text();
				addCard( id, title, desc );
				tryLoad( n + 1 );
			},
			error: function(){
				$('#loading').hide();
				if( found === 0 ){ $('#empty').show(); }
			}
		});
	}

	tryLoad(1);
})();
</script>
</body>
</html>
